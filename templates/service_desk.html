<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCity - IT Service Desk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #070b14; color: white; padding: 20px; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
        .stat-box { border-left: 4px solid #0ea5e9; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; }
        .table-dark { --bs-table-bg: transparent; }
        .badge-open { background-color: #ef4444; }
        .badge-progress { background-color: #f59e0b; color: black; }
        .badge-resolved { background-color: #10b981; }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-0 text-info"><span class="material-icons-round align-middle">support_agent</span> NOC Service Desk</h3>
                <small class="text-secondary">Internal Incident Management System (Local)</small>
            </div>
            <button class="btn btn-outline-info rounded-pill" onclick="fetchTickets()">
                <span class="material-icons-round align-middle fs-5">refresh</span> Refresh Data
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-box" style="border-color: #0ea5e9;">
                    <h6 class="text-secondary fw-bold">TOTAL TICKETS</h6>
                    <h2 class="mb-0 fw-bold" id="stat-total">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box" style="border-color: #ef4444;">
                    <h6 class="text-secondary fw-bold">OPEN / UNASSIGNED</h6>
                    <h2 class="mb-0 fw-bold text-danger" id="stat-open">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-box" style="border-color: #10b981;">
                    <h6 class="text-secondary fw-bold">RESOLVED</h6>
                    <h2 class="mb-0 fw-bold text-success" id="stat-resolved">0</h2>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h5 class="fw-bold mb-3">Live Incident Database</h5>
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead class="text-secondary border-bottom border-secondary">
                        <tr>
                            <th>TKT ID</th>
                            <th>ISSUE & LOCATION</th>
                            <th>PRIORITY</th>
                            <th>STATUS</th>
                            <th>ASSIGNED TO</th>
                            <th>TIME</th>
                            <th class="text-end">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-tbody">
                        <tr><td colspan="7" class="text-center py-4 text-secondary">Loading tickets from FastAPI...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000/api/v1/tickets";

        // 1. DATA MANGWANA (GET)
        async function fetchTickets() {
            try {
                const response = await fetch(API_BASE + "/");
                const tickets = await response.json();
                
                // Stats update karna
                document.getElementById('stat-total').innerText = tickets.length;
                document.getElementById('stat-open').innerText = tickets.filter(t => t.status === 'open').length;
                document.getElementById('stat-resolved').innerText = tickets.filter(t => t.status === 'resolved').length;

                // Table me data dalna
                let html = "";
                // Ulta kar rahe hain taaki nayi ticket upar dikhe
                tickets.reverse().forEach(t => {
                    let statusBadge = t.status === 'open' ? '<span class="badge badge-open">OPEN</span>' : 
                                      t.status === 'in_progress' ? '<span class="badge badge-progress">IN PROGRESS</span>' : 
                                      '<span class="badge badge-resolved">RESOLVED</span>';
                    
                    let engineer = t.assigned_engineer ? `<span class="text-info fw-bold">${t.assigned_engineer}</span>` : '<span class="text-secondary">Unassigned</span>';
                    
                    let time = new Date(t.created_at).toLocaleTimeString();

                    // Buttons logic
                    let actionButtons = "";
                    if (t.status === 'open') {
                        actionButtons = `<button class="btn btn-sm btn-primary fw-bold" onclick="assignTicket(${t.ticket_id})">Assign</button>`;
                    } else if (t.status === 'in_progress') {
                        actionButtons = `<button class="btn btn-sm btn-success fw-bold" onclick="resolveTicket(${t.ticket_id})">Mark Resolved</button>`;
                    } else {
                        actionButtons = `<span class="text-success fw-bold"><span class="material-icons-round fs-6 align-middle">done_all</span> Closed</span>`;
                    }

                    html += `
                        <tr class="border-bottom border-secondary border-opacity-25">
                            <td class="fw-bold text-secondary">#${t.ticket_id}</td>
                            <td>
                                <div class="fw-bold text-white">${t.issue_type}</div>
                                <div style="font-size: 0.8rem;" class="text-secondary">${t.location}</div>
                            </td>
                            <td><span class="badge bg-dark border border-secondary text-uppercase">${t.severity}</span></td>
                            <td>${statusBadge}</td>
                            <td>${engineer}</td>
                            <td class="text-secondary" style="font-size: 0.85rem;">${time}</td>
                            <td class="text-end">${actionButtons}</td>
                        </tr>
                    `;
                });
                document.getElementById('tickets-tbody').innerHTML = html || "<tr><td colspan='7' class='text-center py-4'>No tickets found.</td></tr>";
            } catch (e) {
                document.getElementById('tickets-tbody').innerHTML = `<tr><td colspan='7' class='text-center py-4 text-danger'>Failed to connect to FastAPI Backend. Is the server running?</td></tr>`;
            }
        }

        // 2. ENGINEER ASSIGN KARNA (PUT)
        async function assignTicket(id) {
            let engName = prompt("Enter Engineer Name (e.g., Nisarg, John):");
            if (!engName) return;

            try {
                await fetch(`${API_BASE}/${id}/assign?engineer_name=${engName}`, { method: 'PUT' });
                fetchTickets(); // Refresh table
            } catch(e) { alert("Error assigning ticket"); }
        }

        // 3. TICKET CLOSE KARNA (PUT)
        async function resolveTicket(id) {
            if (!confirm("Are you sure this issue is fixed?")) return;

            try {
                await fetch(`${API_BASE}/${id}/close`, { method: 'PUT' });
                fetchTickets(); // Refresh table
            } catch(e) { alert("Error resolving ticket"); }
        }

        // Har 3 second me table auto-update hogi
        fetchTickets();
        setInterval(fetchTickets, 3000);
    </script>
</body>
</html>
