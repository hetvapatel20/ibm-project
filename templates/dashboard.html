<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City - Master Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --bg-main: #070b14; --bg-surface: rgba(15, 23, 42, 0.7); --accent: #0ea5e9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: white; overflow-x: hidden; }
        .glass-card { background: var(--bg-surface); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .cam-box { background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #334155; height: 220px; }
        .cam-box img { width: 100%; height: 100%; object-fit: cover; }
        .hud-overlay { position: absolute; top: 0; width: 100%; padding: 10px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; font-size: 0.8rem; }
        .scrollable { max-height: 250px; overflow-y: auto; }
        .btn-sos.active { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center">
        <h4 class="mb-0 text-info fw-bold">SMART CITY NOC</h4>
        <div id="clock" class="badge bg-dark border border-secondary p-2">00:00:00</div>
    </header>

    <div class="container-fluid p-3">
        <div class="row g-3">
            <div class="col-md-3">
                <div class="glass-card p-3 mb-3 text-center">
                    <div class="text-success fw-bold mb-2">● SYSTEM ONLINE</div>
                    <button class="btn btn-outline-danger w-100 fw-bold" onclick="toggleLockdown()" id="sos-btn">CRISIS LOCKDOWN</button>
                </div>
                <div class="glass-card p-3">
                    <h6 class="text-secondary border-bottom pb-2">NODE STATUS</h6>
                    <div class="scrollable">
                        <table class="table table-sm table-dark">
                            <tbody id="node-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="row g-2 mb-3">
                    <div class="col-4 text-center glass-card py-2">
                        <small class="d-block text-secondary">PROCESSED</small>
                        <h4 id="stat-total">0</h4>
                    </div>
                    <div class="col-4 text-center glass-card py-2">
                        <small class="d-block text-secondary">HEAVY UNITS</small>
                        <h4 id="stat-heavy">0</h4>
                    </div>
                    <div class="col-4 text-center glass-card py-2">
                        <small class="d-block text-secondary">EFFICIENCY</small>
                        <h4 class="text-info">98%</h4>
                    </div>
                </div>
                <div class="row g-2">
                    <div class="col-6"><div class="cam-box"><div class="hud-overlay"><span>NODE-01</span><span class="badge bg-success" id="sig-0">GREEN</span></div><img src="/video_feed/1"></div></div>
                    <div class="col-6"><div class="cam-box"><div class="hud-overlay"><span>NODE-02</span><span class="badge bg-danger" id="sig-1">RED</span></div><img src="/video_feed/2"></div></div>
                    <div class="col-6"><div class="cam-box"><div class="hud-overlay"><span>NODE-03</span><span class="badge bg-danger" id="sig-2">RED</span></div><img src="/video_feed/3"></div></div>
                    <div class="col-6"><div class="cam-box"><div class="hud-overlay"><span>NODE-04</span><span class="badge bg-danger" id="sig-3">RED</span></div><img src="/video_feed/4"></div></div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="glass-card p-3 mb-3">
                    <h6>RAISE TICKET</h6>
                    <input type="text" id="t-loc" class="form-control form-control-sm mb-2" placeholder="Location">
                    <select id="t-type" class="form-select form-select-sm mb-2">
                        <option>Vehicle Collision</option>
                        <option>Heavy Congestion</option>
                    </select>
                    <button class="btn btn-warning btn-sm w-100 fw-bold" onclick="sendTicket()">SUBMIT</button>
                </div>
                <div class="glass-card p-3">
                    <h6>INCIDENT QUEUE</h6>
                    <div class="scrollable" id="ticket-list" style="font-size: 0.75rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        async function fetchStats() {
            const res = await fetch('/get_stats');
            const data = await res.json();
            document.getElementById('stat-total').innerText = data.total_processed;
            document.getElementById('stat-heavy').innerText = data.heavy_units;

            let html = "";
            data.lanes.forEach((l, i) => {
                html += `<tr><td>${l.name}</td><td class="text-info">${l.volume}</td><td>${l.signal_state}</td></tr>`;
                const badge = document.getElementById(`sig-${i}`);
                badge.innerText = l.signal_state;
                badge.className = `badge bg-${l.signal_state === 'GREEN' ? 'success' : 'danger'}`;
            });
            document.getElementById('node-table').innerHTML = html;
        }

        async function sendTicket() {
            const location = document.getElementById('t-loc').value;
            const type = document.getElementById('t-type').value;
            await fetch('/create_ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({location, type, time: new Date().toLocaleTimeString()})
            });
            document.getElementById('t-loc').value = "";
            loadTickets();
        }

        async function loadTickets() {
            const res = await fetch('/get_tickets');
            const data = await res.json();
            document.getElementById('ticket-list').innerHTML = data.map(t => 
                `<div class="border-bottom border-secondary mb-2 pb-1">
                    <b class="text-warning">${t.type}</b> <br> ${t.location} | ${t.time}
                </div>`
            ).join('');
        }

        function toggleLockdown() {
            const btn = document.getElementById('sos-btn');
            btn.classList.toggle('active');
            btn.innerText = btn.classList.contains('active') ? "SYSTEM LOCKED" : "CRISIS LOCKDOWN";
        }

        setInterval(fetchStats, 2000);
        setInterval(loadTickets, 5000);
        fetchStats(); loadTickets();
    </script>
</body>
</html>
